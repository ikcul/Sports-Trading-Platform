services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant-local-only}
      POSTGRES_DB: ${POSTGRES_DB:-quant}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis-local-only}"]
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    build:
      context: ./backend
      target: runtime
    env_file:
      - .env
    environment:
      ENV_MODE: ${ENV_MODE:-sandbox}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-quant}:${POSTGRES_PASSWORD:-quant-local-only}@postgres:5432/${POSTGRES_DB:-quant}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis-local-only}@redis:6379/0
      APIFOOTBALL_API_KEY: ${APIFOOTBALL_API_KEY:-}
      APIFOOTBALL_WORLD_CUP_LEAGUE_ID: ${APIFOOTBALL_WORLD_CUP_LEAGUE_ID:-}
      KALSHI_API_CREDENTIALS: ${KALSHI_API_CREDENTIALS:-}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./data/world_cup_2026_jun11_jun28_real:/app/data/world_cup_2026_jun11_jun28_real:ro
      - ./tools:/app/tools:ro
    ports:
      - "8000:8000"

  backend-test:
    build:
      context: ./backend
      target: test
    env_file:
      - .env.test
    environment:
      ENV_MODE: sandbox
      APIFOOTBALL_API_KEY: ""
      APIFOOTBALL_WORLD_CUP_LEAGUE_ID: ""
      KALSHI_API_CREDENTIALS: ""
    volumes:
      - ./data/world_cup_2026_jun11_jun28_real:/app/data/world_cup_2026_jun11_jun28_real:ro

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
