services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
      POSTGRES_DB: quant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      target: runtime
    env_file:
      - .env
    environment:
      ENV_MODE: ${ENV_MODE:-sandbox}
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      REDIS_URL: redis://redis:6379/0
      APIFOOTBALL_API_KEY: ${APIFOOTBALL_API_KEY:-}
      APIFOOTBALL_WORLD_CUP_LEAGUE_ID: ${APIFOOTBALL_WORLD_CUP_LEAGUE_ID:-}
      KALSHI_API_CREDENTIALS: ${KALSHI_API_CREDENTIALS:-}
    depends_on:
      backend-test:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./data/world_cup_2026_jun11_jun28_real:/app/data/world_cup_2026_jun11_jun28_real:ro
    ports:
      - "8000:8000"

  backend-test:
    build:
      context: ./backend
      target: test
    env_file:
      - .env
    environment:
      ENV_MODE: ${ENV_MODE:-sandbox}
      APIFOOTBALL_API_KEY: ${APIFOOTBALL_API_KEY:-}
      APIFOOTBALL_WORLD_CUP_LEAGUE_ID: ${APIFOOTBALL_WORLD_CUP_LEAGUE_ID:-}
      KALSHI_API_CREDENTIALS: ${KALSHI_API_CREDENTIALS:-}
    volumes:
      - ./data/world_cup_2026_jun11_jun28_real:/app/data/world_cup_2026_jun11_jun28_real:ro

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
